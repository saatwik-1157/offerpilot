<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guide — OfferPilot Resource Hub</title>
<meta name="description" content="Free, in-depth guides for F-1/OPT students on the visa job search." />
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="js/theme.js"></script>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="hero" id="guide-hero" style="padding:64px 0 56px">
  <div class="container" style="max-width:820px">
    <a href="resources.html" class="guide-back">← Resource hub</a>
    <span class="eyebrow hero-eyebrow" id="g-tag" style="margin-top:18px">Guide</span>
    <h1 id="g-title" style="max-width:760px;margin-top:14px">Loading…</h1>
    <p class="lead" id="g-dek" style="color:#AEB6D0;max-width:640px"></p>
    <div class="guide-meta" id="g-meta"></div>
  </div>
</header>

<section class="section">
  <div class="container" style="max-width:760px">
    <article class="prose" id="g-body"></article>

    <div class="cta-band reveal" style="margin-top:56px">
      <h2 class="h-xl">Reading is good. Applying is better.</h2>
      <p>Let OfferPilot run the volume — tailored applications every day — while you focus on interviews.</p>
      <a href="signup.html" class="btn btn-white btn-lg">Start with OfferPilot →</a>
    </div>

    <div id="g-related" style="margin-top:56px"></div>
  </div>
</section>

<script src="js/config.js"></script>
<script src="js/guides.js"></script>
<script src="js/main.js"></script>
<script>
(function () {
  function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
  var guides = window.GUIDES || [];
  var id = new URLSearchParams(location.search).get("id");
  var g = guides.filter(function (x){ return x.id === id; })[0] || guides[0];
  if (!g) { location.replace("resources.html"); return; }

  document.title = g.title + " — OfferPilot";
  var meta = document.querySelector('meta[name="description"]');
  if (meta) meta.setAttribute("content", g.dek);

  document.getElementById("g-tag").textContent = g.tag;
  document.getElementById("g-title").textContent = g.title;
  document.getElementById("g-dek").textContent = g.dek;
  document.getElementById("g-meta").innerHTML =
    '<span class="g-emoji">' + g.emoji + '</span><span>' + g.readMins + ' min read</span>';

  // Render structured body → prose HTML (content is first-party; escape anyway).
  var html = g.sections.map(function (s) {
    var out = "";
    if (s.h) out += "<h2>" + esc(s.h) + "</h2>";
    if (s.p) out += "<p>" + esc(s.p) + "</p>";
    if (s.list) out += "<ul>" + s.list.map(function (li){ return "<li>" + esc(li) + "</li>"; }).join("") + "</ul>";
    if (s.note) out += '<div class="prose-note">' + esc(s.note) + "</div>";
    return out;
  }).join("");
  document.getElementById("g-body").innerHTML = html;

  // Related guides (everything else)
  var related = guides.filter(function (x){ return x.id !== g.id; }).slice(0, 3);
  if (related.length) {
    document.getElementById("g-related").innerHTML =
      '<h3 class="h-lg" style="margin-bottom:20px">Keep reading</h3>' +
      '<div class="res-grid">' + related.map(function (r) {
        return '<a class="res-card" href="guide.html?id=' + encodeURIComponent(r.id) + '">' +
          '<div class="thumb ' + (r.thumb || "") + '">' + r.emoji + '</div>' +
          '<div class="rbody"><div class="tag">' + esc(r.tag) + '</div><h3>' + esc(r.title) + '</h3>' +
          '<p>' + esc(r.dek) + '</p><span class="read">Read guide →</span></div></a>';
      }).join("") + '</div>';
  }
  window.scrollTo(0, 0);

  // Reading progress bar
  var prog = document.createElement("div");
  prog.className = "read-progress";
  document.body.appendChild(prog);
  window.addEventListener("scroll", function () {
    var h = document.documentElement;
    var max = h.scrollHeight - h.clientHeight;
    prog.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + "%";
  }, { passive: true });
})();
</script>
</body>
</html>
